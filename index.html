<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook Scheduler</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <div class="app-header">
                <div class="logo">
                    <i class="fab fa-discord"></i>
                    <h1>Discord Scheduler</h1>
                </div>

                <div id="login-status" class="auth-status">
                    <i class="fas fa-circle-notch fa-spin"></i> Checking login...
                </div>
            </div>

            <div class="card message-composer">
                <h2><i class="far fa-calendar-plus"></i> Create Schedule</h2>
                <div class="composer-content">
                    <div class="input-group">
                        <div class="embed-preview-container">
                            <div class="embed-basic-options">
                                <div class="embed-option">
                                    <label for="message-content">Message Content (optional)</label>
                                    <textarea id="message-content" placeholder="This will appear above your embed..."></textarea>
                                </div>

                                <div class="embed-option">
                                    <label for="embed-title">Embed Title</label>
                                    <input type="text" id="embed-title" placeholder="Embed title">
                                </div>

                                <div class="embed-option">
                                    <label for="embed-description">Embed Description</label>
                                    <textarea id="embed-description" placeholder="Main content for your embed..." required></textarea>
                                </div>

                                <div class="embed-option">
                                    <label for="embed-color">Color</label>
                                    <input type="color" id="embed-color" value="#5865F2">
                                </div>
                            </div>

                            <div class="embed-media-options">
                                <div class="embed-option">
                                    <label for="embed-image">Image URL</label>
                                    <input type="url" id="embed-image" placeholder="https://example.com/image.png">
                                </div>

                                <div class="embed-option">
                                    <label for="embed-thumbnail">Thumbnail URL</label>
                                    <input type="url" id="embed-thumbnail" placeholder="https://example.com/thumbnail.png">
                                </div>
                            </div>

                            <div class="embed-author-container">
                                <h4>Author</h4>
                                <div class="embed-option">
                                    <label for="author-name">Name</label>
                                    <input type="text" id="author-name" placeholder="Author name">
                                </div>
                                <div class="embed-option">
                                    <label for="author-icon">Icon URL</label>
                                    <input type="url" id="author-icon" placeholder="https://example.com/author-icon.png">
                                </div>
                            </div>

                            <div class="embed-footer-container">
                                <h4>Footer</h4>
                                <div class="embed-option">
                                    <label for="footer-text">Text</label>
                                    <input type="text" id="footer-text" placeholder="Footer text">
                                </div>
                                <div class="embed-option">
                                    <label for="footer-icon">Icon URL</label>
                                    <input type="url" id="footer-icon" placeholder="https://example.com/footer-icon.png">
                                </div>
                            </div>

                            <div class="embed-fields-container">
                                <div class="embed-fields-header">
                                    <h4>Fields</h4>
                                    <button type="button" id="add-field" class="add-field-btn">
                                        <i class="fas fa-plus"></i> Add Field
                                    </button>
                                </div>
                                <div id="embed-fields" class="embed-fields-list"></div>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Schedule Date & Time</label>
                        <div class="datetime-picker">
                            <div class="date-input">
                                <i class="far fa-calendar-alt"></i>
                                <input type="date" id="schedule-date">
                            </div>
                            <div class="time-input">
                                <i class="far fa-clock"></i>
                                <div class="time-selectors">
                                    <select id="hour-select" aria-label="Hour">
                                    </select>
                                    <span>:</span>
                                    <select id="minute-select" aria-label="Minute">
                                    </select>
                                </div>
                            </div>
                        </div>
                        <input type="hidden" id="schedule-time">
                    </div>

                    <button id="schedule-message" class="primary-btn" disabled>
                        <i class="far fa-paper-plane"></i> Schedule Message
                    </button>
                </div>
            </div>

            <div class="card scheduled-list">
                <h2><i class="far fa-calendar-alt"></i> Scheduled Messages</h2>
                <div id="message-list">
                    <div class="loading-messages">
                        <i class="fas fa-circle-notch fa-spin"></i> Loading messages...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="status-indicator"></div>

    <div id="token-modal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-key"></i> GitHub Token Required</h2>
            <div class="input-group token-input-centered">
                <input type="password" id="github-token" placeholder="Paste your token here">
            </div>
            <button id="submit-token" class="primary-btn">
                <i class="fas fa-check"></i> Submit Token
            </button>
        </div>
    </div>

    <script src="js/webhook.js"></script>
    <script src="js/github.js"></script>
    <script src="js/scheduler.js"></script>
    <script src="js/app.js"></script>
    test2
</body>
</html>
